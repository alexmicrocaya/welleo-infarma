<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welleo · Pedidos Infarma 2026</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Georgia, serif; background: #0F172A; }
    input, textarea, select { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwslpTko3NJoGU2vZq3Y3VvWiBMZ61M2WUPW-PMTt_vdLBVNbbDhMMXy9xJi9kxCioKwQ/exec";
    const QUEUE_KEY = "welleo_pending_orders";

    function loadQueue() {
      try { return JSON.parse(localStorage.getItem(QUEUE_KEY) || "[]"); } catch { return []; }
    }
    function saveQueue(q) { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); }
    async function sendOrder(order) {
      // no-cors es necesario para llamar a Apps Script desde GitHub Pages
      // La respuesta es opaca (no podemos leerla) pero el dato llega igualmente a Sheets
      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(order),
        mode: "no-cors"
      });
      // Si fetch no lanza error, asumimos éxito
      return { success: true };
    }

    const DEVICES = [
      { id: "lector_multi", name: "Lector Welleo Multiparamétrico", price: 210.00, udsPerBox: 1, emoji: "🔬", section: "multi" },
      { id: "lector_lipid", name: "Lector Welleo Perfil Lipídico",  price: 235.00, udsPerBox: 1, emoji: "💧", section: "lipid" },
    ];

    const TESTS = [
      { id: "vitd",      name: "Vitamina D",                    price: 4.25,  udsPerBox: 15, pvp: 14.90, section: "multi" },
      { id: "cortisol",  name: "Cortisol",                      price: 5.80,  udsPerBox: 25, pvp: 19.90, section: "multi" },
      { id: "hba1c",     name: "Hemoglobina Glicada (HbA1c)",   price: 3.00,  udsPerBox: 15, pvp: 14.90, section: "multi" },
      { id: "ferritina", name: "Ferritina",                     price: 4.75,  udsPerBox: 15, pvp: 14.90, section: "multi" },
      { id: "folico",    name: "Ácido Fólico",                  price: null,  udsPerBox: null, pvp: null, section: "multi" },
      { id: "pcr",       name: "Proteína C Reactiva (CRP)",     price: 3.25,  udsPerBox: 15, pvp: 14.90, section: "multi" },
      { id: "tsh",       name: "TSH Estimulante Tiroides",      price: 5.50,  udsPerBox: 15, pvp: 18.90, section: "multi" },
      { id: "amh",       name: "Hormona Antimülleriana (AMH)",  price: null,  udsPerBox: null, pvp: null, section: "multi" },
      { id: "estradiol", name: "Estradiol (E2)",                price: null,  udsPerBox: null, pvp: null, section: "multi" },
      { id: "bhcg",      name: "Beta-hCG",                     price: null,  udsPerBox: null, pvp: null, section: "multi" },
      { id: "lipid_test",name: "Perfil Lipídico",              price: null,  udsPerBox: 25,  pvp: 13.90, section: "lipid" },
    ];

    const SUPPLEMENTS = [
      { id: "vitdk",        name: "Vitamina D3 + K2",      emoji: "☀️", udsPerBox: 120, priceFarmacia: 12.10, pvp: 26.90 },
      { id: "magnesio",     name: "Magnesio Bisglicinato", emoji: "⚡", udsPerBox: 120, priceFarmacia: 11.60, pvp: 25.90 },
      { id: "berberina",    name: "Berberina",             emoji: "🌿", udsPerBox: 90,  priceFarmacia: 19.30, pvp: 42.90 },
      { id: "vitc",         name: "Vitamina C",            emoji: "🍊", udsPerBox: 60,  priceFarmacia: 14.80, pvp: 32.90 },
      { id: "zinc",         name: "Zinc",                  emoji: "🔩", udsPerBox: 90,  priceFarmacia: 8.90,  pvp: 19.90 },
      { id: "lactoferrina", name: "Lactoferrina",          emoji: "🥛", udsPerBox: 60,  priceFarmacia: 53.90, pvp: 119.90 },
      { id: "selenio",      name: "Selenio",               emoji: "✨", udsPerBox: 120, priceFarmacia: 8.90,  pvp: 19.90 },
      { id: "ashwagandha",  name: "Ashwagandha",           emoji: "🌱", udsPerBox: 60,  priceFarmacia: 14.80, pvp: 32.90 },
      { id: "coq10",        name: "Coenzima Q10",          emoji: "❤️", udsPerBox: 60,  priceFarmacia: 13.40, pvp: 29.90 },
    ];

    const STEPS = ["Cliente", "Dispositivos", "Suplementos", "Resumen"];
    const EMPTY_DEVICES_QTY = Object.fromEntries([...DEVICES, ...TESTS].map(p => [p.id, 0]));
    const EMPTY_SUPPS_QTY   = Object.fromEntries(SUPPLEMENTS.map(s => [s.id, 0]));
    const EMPTY_CLIENT      = { nombre: "", empresa: "", email: "", telefono: "", nif: "", notas: "", acepta_comercial: false };

    function fmt(n) { return n != null ? n.toFixed(2).replace(".", ",") + " €" : "—"; }

    function calcTotals(dq, sq) {
      let subtotal = 0;
      [...DEVICES, ...TESTS].forEach(p => { if (p.price != null) subtotal += (dq[p.id] || 0) * p.price; });
      SUPPLEMENTS.forEach(s => { subtotal += (sq[s.id] || 0) * s.priceFarmacia; });
      return { subtotal, iva: subtotal * 0.21, total: subtotal * 1.21 };
    }

    function QtyInput({ value, onChange }) {
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6 }}>
          <button onClick={() => onChange(Math.max(0, (value || 0) - 1))}
            style={{ width: 30, height: 30, borderRadius: 7, border: "1.5px solid #CBD5E1", background: "#F8FAFC", cursor: "pointer", fontSize: 17, fontWeight: 700, color: "#475569" }}>−</button>
          <span style={{ minWidth: 34, textAlign: "center", fontWeight: 700, fontSize: 16, color: value > 0 ? "#0F172A" : "#94A3B8" }}>{value || 0}</span>
          <button onClick={() => onChange((value || 0) + 1)}
            style={{ width: 30, height: 30, borderRadius: 7, border: "1.5px solid #0EA5E9", background: "#0EA5E9", cursor: "pointer", fontSize: 17, fontWeight: 700, color: "white" }}>+</button>
        </div>
      );
    }

    function PriceBadge({ price, udsPerBox, pvp }) {
      if (price == null) return <span style={{ fontSize: 10, color: "#F59E0B", fontWeight: 600 }}>Precio pendiente</span>;
      return (
        <div style={{ marginTop: 4 }}>
          <span style={{ fontSize: 11, fontWeight: 700, color: "#0F172A" }}>{fmt(price)} / ud.</span>
          {udsPerBox && <span style={{ fontSize: 10, color: "#64748B" }}> · {udsPerBox} uds/caja → {fmt(price * udsPerBox)}/caja</span>}
          {pvp && <span style={{ fontSize: 10, color: "#10B981", marginLeft: 6 }}>PVP {fmt(pvp)}</span>}
        </div>
      );
    }

    function StepIndicator({ current }) {
      return (
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 28 }}>
          {STEPS.map((s, i) => (
            <div key={s} style={{ display: "flex", alignItems: "center" }}>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                <div style={{ width: 32, height: 32, borderRadius: "50%", background: i < current ? "#10B981" : i === current ? "#0EA5E9" : "#E2E8F0", color: i <= current ? "white" : "#94A3B8", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, boxShadow: i === current ? "0 0 0 3px rgba(14,165,233,0.2)" : "none" }}>
                  {i < current ? "✓" : i + 1}
                </div>
                <span style={{ fontSize: 10, color: i === current ? "#0EA5E9" : "#94A3B8", fontWeight: i === current ? 700 : 400 }}>{s}</span>
              </div>
              {i < STEPS.length - 1 && <div style={{ width: 40, height: 2, marginBottom: 16, background: i < current ? "#10B981" : "#E2E8F0" }} />}
            </div>
          ))}
        </div>
      );
    }

    function OfflineBanner({ pending, syncing, onSync }) {
      if (pending === 0) return null;
      return (
        <div style={{ background: syncing ? "#FEF9C3" : "#FEF2F2", border: `1px solid ${syncing ? "#FDE047" : "#FECACA"}`, borderRadius: 10, padding: "10px 14px", marginBottom: 16, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
          <div>
            <span style={{ fontSize: 13, fontWeight: 700, color: syncing ? "#854D0E" : "#DC2626" }}>
              {syncing ? "⏳ Sincronizando..." : `📦 ${pending} pedido${pending > 1 ? "s" : ""} pendiente${pending > 1 ? "s" : ""}`}
            </span>
            <div style={{ fontSize: 11, color: "#92400E", marginTop: 2 }}>
              {syncing ? "Enviando a Google Sheets..." : "Sin conexión — guardado en el dispositivo"}
            </div>
          </div>
          {!syncing && <button onClick={onSync} style={{ background: "#DC2626", color: "white", border: "none", borderRadius: 8, padding: "6px 12px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>Reintentar</button>}
        </div>
      );
    }

    function App() {
      const [step, setStep]             = useState(0);
      const [submitted, setSubmitted]   = useState(false);
      const [loading, setLoading]       = useState(false);
      const [lastSaved, setLastSaved]   = useState(null);
      const [client, setClient]         = useState(EMPTY_CLIENT);
      const [deviceQty, setDeviceQty]   = useState(EMPTY_DEVICES_QTY);
      const [suppQty, setSuppQty]       = useState(EMPTY_SUPPS_QTY);
      const [pendingCount, setPendingCount] = useState(loadQueue().length);
      const [syncing, setSyncing]       = useState(false);
      const retryTimer = useRef(null);

      const clientValid = client.nombre && client.empresa && client.email;
      const hasAnything = Object.values(deviceQty).some(v => v > 0) || Object.values(suppQty).some(v => v > 0);
      const { subtotal, iva, total } = calcTotals(deviceQty, suppQty);

      useEffect(() => {
        if (pendingCount > 0) { retryTimer.current = setInterval(() => flushQueue(), 30000); }
        return () => clearInterval(retryTimer.current);
      }, [pendingCount]);

      useEffect(() => {
        const onOnline = () => { if (pendingCount > 0) flushQueue(); };
        window.addEventListener("online", onOnline);
        return () => window.removeEventListener("online", onOnline);
      }, [pendingCount]);

      async function flushQueue() {
        const queue = loadQueue();
        if (!queue.length) return;
        setSyncing(true);
        const remaining = [];
        for (const order of queue) {
          try { await sendOrder(order); } catch { remaining.push(order); }
        }
        saveQueue(remaining);
        setPendingCount(remaining.length);
        setSyncing(false);
      }

      async function handleSubmit() {
        setLoading(true);
        const { subtotal, iva, total } = calcTotals(deviceQty, suppQty);
        const order = { ...client, deviceQty, suppQty, subtotal: subtotal.toFixed(2), iva: iva.toFixed(2), total: total.toFixed(2), timestamp: new Date().toISOString() };
        try {
          await sendOrder(order);
          setLastSaved({ ...order, sent: true });
        } catch {
          const queue = loadQueue();
          queue.push(order);
          saveQueue(queue);
          setPendingCount(queue.length);
          setLastSaved({ ...order, sent: false });
        }
        setLoading(false);
        setSubmitted(true);
      }

      function resetForm() {
        setSubmitted(false); setStep(0); setLastSaved(null);
        setClient(EMPTY_CLIENT); setDeviceQty(EMPTY_DEVICES_QTY); setSuppQty(EMPTY_SUPPS_QTY);
      }

      const inputStyle = { width: "100%", padding: "10px 14px", borderRadius: 10, border: "1.5px solid #E2E8F0", fontSize: 14, color: "#0F172A", background: "#F8FAFC", outline: "none", boxSizing: "border-box", fontFamily: "inherit" };
      const labelStyle = { fontSize: 12, fontWeight: 700, color: "#475569", textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 4, display: "block" };

      if (submitted && lastSaved) {
        const sent = lastSaved.sent;
        return (
          <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #0F172A 0%, #1E3A5F 100%)", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
            <div style={{ background: "white", borderRadius: 24, padding: 40, textAlign: "center", maxWidth: 440, width: "100%", boxShadow: "0 32px 64px rgba(0,0,0,0.3)" }}>
              <div style={{ fontSize: 56, marginBottom: 12 }}>{sent ? "✅" : "📦"}</div>
              <h2 style={{ fontSize: 22, fontWeight: 700, color: "#0F172A", margin: "0 0 6px" }}>{sent ? "¡Pedido enviado!" : "Guardado localmente"}</h2>
              <p style={{ color: "#64748B", fontSize: 14, margin: "0 0 4px" }}>{lastSaved.nombre} — {lastSaved.empresa}</p>
              <div style={{ background: "#F8FAFC", borderRadius: 12, padding: "12px 16px", margin: "16px 0", textAlign: "left" }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: "#64748B", padding: "2px 0" }}><span>Base imponible</span><span>{fmt(parseFloat(lastSaved.subtotal))}</span></div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: "#64748B", padding: "2px 0" }}><span>IVA (21%)</span><span>{fmt(parseFloat(lastSaved.iva))}</span></div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 15, fontWeight: 700, color: "#0F172A", padding: "6px 0 0", borderTop: "1px solid #E2E8F0", marginTop: 4 }}><span>TOTAL</span><span>{fmt(parseFloat(lastSaved.total))}</span></div>
              </div>
              <div style={{ background: sent ? "#F0FDF4" : "#FFF7ED", border: `1px solid ${sent ? "#BBF7D0" : "#FED7AA"}`, borderRadius: 12, padding: "12px 16px", marginBottom: 16, fontSize: 13, color: sent ? "#166534" : "#92400E" }}>
                {sent ? "Datos guardados en Google Sheets correctamente." : `Sin conexión. Se enviará al recuperar red. (${pendingCount} pendiente${pendingCount > 1 ? "s" : ""})`}
              </div>
              {!sent && (
                <button onClick={flushQueue} disabled={syncing} style={{ width: "100%", padding: "11px 0", borderRadius: 10, marginBottom: 10, background: syncing ? "#E2E8F0" : "#F59E0B", border: "none", color: syncing ? "#94A3B8" : "white", fontWeight: 700, fontSize: 14, cursor: syncing ? "not-allowed" : "pointer" }}>
                  {syncing ? "Intentando enviar..." : "🔄 Reintentar ahora"}
                </button>
              )}
              <button onClick={resetForm} style={{ width: "100%", padding: "12px 0", borderRadius: 12, border: "none", background: "linear-gradient(135deg, #0EA5E9, #0284C7)", color: "white", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
                + Nuevo pedido
              </button>
            </div>
          </div>
        );
      }

      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(160deg, #0F172A 0%, #1E3A5F 60%, #0C4A6E 100%)", paddingBottom: 40 }}>
          <div style={{ background: "rgba(255,255,255,0.04)", backdropFilter: "blur(12px)", borderBottom: "1px solid rgba(255,255,255,0.08)", padding: "18px 24px", textAlign: "center" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 12 }}>
              <div style={{ width: 38, height: 38, borderRadius: 10, background: "linear-gradient(135deg, #0EA5E9, #10B981)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, color: "white", fontWeight: 700 }}>W</div>
              <div>
                <div style={{ color: "white", fontSize: 19, fontWeight: 700 }}>Welleo</div>
                <div style={{ color: "#94A3B8", fontSize: 10, letterSpacing: "0.15em", textTransform: "uppercase" }}>Infarma 2026 · Pedidos</div>
              </div>
              {pendingCount > 0 && <div style={{ marginLeft: 8, background: "#DC2626", color: "white", borderRadius: 20, padding: "2px 8px", fontSize: 11, fontWeight: 700 }}>{pendingCount} pendiente{pendingCount > 1 ? "s" : ""}</div>}
            </div>
          </div>

          <div style={{ maxWidth: 580, margin: "28px auto 0", padding: "0 16px" }}>
            <OfflineBanner pending={pendingCount} syncing={syncing} onSync={flushQueue} />
            <div style={{ background: "white", borderRadius: 24, overflow: "hidden", boxShadow: "0 32px 80px rgba(0,0,0,0.4)" }}>
              <div style={{ padding: "28px 28px 0" }}><StepIndicator current={step} /></div>
              <div style={{ padding: "0 28px 28px" }}>

                {step === 0 && (
                  <div>
                    <h2 style={{ fontSize: 20, fontWeight: 700, color: "#0F172A", margin: "0 0 6px" }}>Datos del cliente</h2>
                    <p style={{ color: "#94A3B8", fontSize: 13, margin: "0 0 20px" }}>Rellena los datos de contacto</p>
                    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                      {[
                        { key: "nombre",   label: "Nombre y apellidos *", placeholder: "Ana García López" },
                        { key: "empresa",  label: "Farmacia / Empresa *", placeholder: "Farmacia García" },
                        { key: "email",    label: "Email *",              placeholder: "ana@farmacia.com", type: "email" },
                        { key: "telefono", label: "Teléfono",             placeholder: "612 345 678",      type: "tel" },
                        { key: "nif",      label: "NIF / CIF",            placeholder: "B12345678" },
                      ].map(f => (
                        <div key={f.key}>
                          <label style={labelStyle}>{f.label}</label>
                          <input type={f.type || "text"} placeholder={f.placeholder} value={client[f.key]}
                            onChange={e => setClient({ ...client, [f.key]: e.target.value })} style={inputStyle} />
                        </div>
                      ))}
                      <div>
                        <label style={labelStyle}>Notas adicionales</label>
                        <textarea placeholder="Observaciones, condiciones especiales..." value={client.notas}
                          onChange={e => setClient({ ...client, notas: e.target.value })}
                          rows={3} style={{ ...inputStyle, resize: "vertical" }} />
                      </div>
                      <div style={{ background: "#F8FAFC", borderRadius: 12, padding: 14, border: "1px solid #E2E8F0" }}>
                        <p style={{ fontSize: 11, color: "#64748B", margin: "0 0 10px", lineHeight: 1.5 }}>
                          Sus datos serán tratados por <strong>MICROCAYA SL</strong> (CIF B48997332) para gestionar la relación comercial. Puede ejercer sus derechos escribiendo a <strong>lopd@microcaya.com</strong>.
                        </p>
                        <label style={{ display: "flex", alignItems: "flex-start", gap: 10, cursor: "pointer" }}>
                          <input type="checkbox" checked={client.acepta_comercial}
                            onChange={e => setClient({ ...client, acepta_comercial: e.target.checked })}
                            style={{ marginTop: 2, width: 16, height: 16, cursor: "pointer" }} />
                          <span style={{ fontSize: 12, color: "#475569", lineHeight: 1.4 }}>
                            Acepto recibir comunicaciones comerciales de Microcaya SL.
                          </span>
                        </label>
                      </div>
                    </div>
                  </div>
                )}

                {step === 1 && (
                  <div>
                    <h2 style={{ fontSize: 20, fontWeight: 700, color: "#0F172A", margin: "0 0 6px" }}>Dispositivos Welleo</h2>
                    <p style={{ color: "#94A3B8", fontSize: 13, margin: "0 0 20px" }}>Precios en € sin IVA · Naranja = precio pendiente de confirmar</p>
                    <div style={{ border: "2px solid #E0F2FE", borderRadius: 16, padding: 18, marginBottom: 14, background: "#F0F9FF" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                        <span style={{ fontSize: 24 }}>💧</span>
                        <div><div style={{ fontWeight: 700, fontSize: 16, color: "#0369A1" }}>Welleo Lipid</div>
                        <div style={{ fontSize: 12, color: "#7DD3FC" }}>Perfil lipídico completo</div></div>
                      </div>
                      {[...DEVICES.filter(d => d.section === "lipid"), ...TESTS.filter(t => t.section === "lipid")].map(p => (
                        <div key={p.id} style={{ background: "white", borderRadius: 10, padding: "10px 14px", border: "1px solid #E0F2FE", marginBottom: 8 }}>
                          <div style={{ fontWeight: 600, fontSize: 13, color: "#0369A1" }}>{p.name}</div>
                          <PriceBadge price={p.price} udsPerBox={p.udsPerBox} pvp={p.pvp} />
                          <QtyInput value={deviceQty[p.id]} onChange={v => setDeviceQty({ ...deviceQty, [p.id]: v })} />
                          {deviceQty[p.id] > 0 && p.price != null && (
                            <div style={{ fontSize: 12, color: "#0369A1", fontWeight: 700, marginTop: 4 }}>Subtotal: {fmt(deviceQty[p.id] * p.price)}</div>
                          )}
                        </div>
                      ))}
                    </div>
                    <div style={{ border: "2px solid #D1FAE5", borderRadius: 16, padding: 18, background: "#F0FDF4" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
                        <span style={{ fontSize: 24 }}>🔬</span>
                        <div><div style={{ fontWeight: 700, fontSize: 16, color: "#065F46" }}>Welleo Multi</div>
                        <div style={{ fontSize: 12, color: "#6EE7B7" }}>Lector multimétrico</div></div>
                      </div>
                      {[...DEVICES.filter(d => d.section === "multi"), ...TESTS.filter(t => t.section === "multi")].map(p => (
                        <div key={p.id} style={{ background: "white", borderRadius: 10, padding: "10px 14px", border: "1px solid #D1FAE5", marginBottom: 8 }}>
                          <div style={{ fontWeight: 600, fontSize: 13, color: "#065F46" }}>{p.name}</div>
                          <PriceBadge price={p.price} udsPerBox={p.udsPerBox} pvp={p.pvp} />
                          <QtyInput value={deviceQty[p.id]} onChange={v => setDeviceQty({ ...deviceQty, [p.id]: v })} />
                          {deviceQty[p.id] > 0 && p.price != null && (
                            <div style={{ fontSize: 12, color: "#065F46", fontWeight: 700, marginTop: 4 }}>Subtotal: {fmt(deviceQty[p.id] * p.price)}</div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {step === 2 && (
                  <div>
                    <h2 style={{ fontSize: 20, fontWeight: 700, color: "#0F172A", margin: "0 0 6px" }}>Suplementos</h2>
                    <p style={{ color: "#94A3B8", fontSize: 13, margin: "0 0 20px" }}>Precio farmacia sin IVA · Cajas completas</p>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      {SUPPLEMENTS.map(s => (
                        <div key={s.id} style={{ background: suppQty[s.id] > 0 ? "#FFF7ED" : "#F8FAFC", border: `1.5px solid ${suppQty[s.id] > 0 ? "#FED7AA" : "#E2E8F0"}`, borderRadius: 12, padding: "12px 14px" }}>
                          <div style={{ fontSize: 20, marginBottom: 2 }}>{s.emoji}</div>
                          <div style={{ fontSize: 12, fontWeight: 700, color: "#0F172A", lineHeight: 1.3 }}>{s.name}</div>
                          <div style={{ fontSize: 10, color: "#64748B", margin: "2px 0" }}>{s.udsPerBox} caps/caja</div>
                          <div style={{ fontSize: 11, fontWeight: 700, color: "#EA580C" }}>{fmt(s.priceFarmacia)}/caja</div>
                          <div style={{ fontSize: 10, color: "#10B981" }}>PVP {fmt(s.pvp)}</div>
                          <QtyInput value={suppQty[s.id]} onChange={v => setSuppQty({ ...suppQty, [s.id]: v })} />
                          {suppQty[s.id] > 0 && <div style={{ fontSize: 11, color: "#EA580C", fontWeight: 700, marginTop: 4 }}>{fmt(suppQty[s.id] * s.priceFarmacia)}</div>}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {step === 3 && (
                  <div>
                    <h2 style={{ fontSize: 20, fontWeight: 700, color: "#0F172A", margin: "0 0 6px" }}>Resumen del pedido</h2>
                    <p style={{ color: "#94A3B8", fontSize: 13, margin: "0 0 20px" }}>Revisa antes de confirmar</p>
                    <div style={{ background: "#F8FAFC", borderRadius: 12, padding: 14, marginBottom: 12 }}>
                      <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: "#94A3B8", marginBottom: 6 }}>Cliente</div>
                      <div style={{ fontWeight: 700, color: "#0F172A" }}>{client.nombre}</div>
                      <div style={{ color: "#64748B", fontSize: 13 }}>{client.empresa}</div>
                      <div style={{ color: "#64748B", fontSize: 13 }}>{client.email}</div>
                      {client.telefono && <div style={{ color: "#64748B", fontSize: 13 }}>{client.telefono}</div>}
                      {client.nif && <div style={{ color: "#64748B", fontSize: 13 }}>NIF: {client.nif}</div>}
                      {client.notas && <div style={{ color: "#94A3B8", fontSize: 12, marginTop: 4, fontStyle: "italic" }}>{client.notas}</div>}
                      <div style={{ fontSize: 11, color: client.acepta_comercial ? "#10B981" : "#94A3B8", marginTop: 6 }}>
                        {client.acepta_comercial ? "✓ Acepta comunicaciones comerciales" : "✗ No acepta comunicaciones comerciales"}
                      </div>
                    </div>
                    {Object.entries(deviceQty).some(([,v]) => v > 0) && (
                      <div style={{ background: "#F0F9FF", borderRadius: 12, padding: 14, marginBottom: 12 }}>
                        <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: "#0EA5E9", marginBottom: 8 }}>Dispositivos y tests</div>
                        {[...DEVICES, ...TESTS].filter(p => deviceQty[p.id] > 0).map(p => (
                          <div key={p.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "3px 0" }}>
                            <span>{p.emoji || "•"} {p.name} ×{deviceQty[p.id]}</span>
                            <strong>{p.price != null ? fmt(deviceQty[p.id] * p.price) : "—"}</strong>
                          </div>
                        ))}
                      </div>
                    )}
                    {Object.entries(suppQty).some(([,v]) => v > 0) && (
                      <div style={{ background: "#FFF7ED", borderRadius: 12, padding: 14, marginBottom: 12 }}>
                        <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: "#EA580C", marginBottom: 8 }}>Suplementos</div>
                        {SUPPLEMENTS.filter(s => suppQty[s.id] > 0).map(s => (
                          <div key={s.id} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, padding: "3px 0" }}>
                            <span>{s.emoji} {s.name} ×{suppQty[s.id]}</span>
                            <strong>{fmt(suppQty[s.id] * s.priceFarmacia)}</strong>
                          </div>
                        ))}
                      </div>
                    )}
                    {!hasAnything && <div style={{ background: "#FEF2F2", border: "1px solid #FECACA", borderRadius: 12, padding: 14, marginBottom: 12, fontSize: 13, color: "#DC2626", textAlign: "center" }}>⚠️ No has añadido ningún producto.</div>}
                    {hasAnything && (
                      <div style={{ background: "#0F172A", borderRadius: 14, padding: 16 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: "#94A3B8", padding: "3px 0" }}><span>Base imponible</span><span>{fmt(subtotal)}</span></div>
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, color: "#94A3B8", padding: "3px 0" }}><span>IVA (21%)</span><span>{fmt(iva)}</span></div>
                        <div style={{ height: 1, background: "rgba(255,255,255,0.1)", margin: "8px 0" }} />
                        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 18, color: "white", fontWeight: 700 }}><span>TOTAL</span><span>{fmt(total)}</span></div>
                      </div>
                    )}
                  </div>
                )}

                <div style={{ display: "flex", gap: 10, marginTop: 24 }}>
                  {step > 0 && (
                    <button onClick={() => setStep(step - 1)} style={{ flex: 1, padding: "13px 0", borderRadius: 12, border: "1.5px solid #E2E8F0", background: "white", fontSize: 14, fontWeight: 700, color: "#64748B", cursor: "pointer" }}>← Atrás</button>
                  )}
                  {step < 3 ? (
                    <button onClick={() => setStep(step + 1)} disabled={step === 0 && !clientValid}
                      style={{ flex: 2, padding: "13px 0", borderRadius: 12, border: "none", background: (step === 0 && !clientValid) ? "#E2E8F0" : "linear-gradient(135deg, #0EA5E9, #0284C7)", color: (step === 0 && !clientValid) ? "#94A3B8" : "white", fontSize: 14, fontWeight: 700, cursor: (step === 0 && !clientValid) ? "not-allowed" : "pointer" }}>Siguiente →</button>
                  ) : (
                    <button onClick={handleSubmit} disabled={!hasAnything || loading}
                      style={{ flex: 2, padding: "13px 0", borderRadius: 12, border: "none", background: (!hasAnything || loading) ? "#E2E8F0" : "linear-gradient(135deg, #10B981, #059669)", color: (!hasAnything || loading) ? "#94A3B8" : "white", fontSize: 14, fontWeight: 700, cursor: (!hasAnything || loading) ? "not-allowed" : "pointer" }}>
                      {loading ? "Guardando..." : "✓ Confirmar pedido"}
                    </button>
                  )}
                </div>
              </div>
            </div>
            <p style={{ textAlign: "center", color: "rgba(255,255,255,0.3)", fontSize: 11, marginTop: 16 }}>Welleo · Microcaya · Infarma 2026</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
